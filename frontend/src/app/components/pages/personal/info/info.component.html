<div class="info">
  <div class="container">
    <div class="personal-title">Личный кабинет</div>
    <div class="personal-pages-selector">
      <div class="personal-page active">Личные данные</div>
      <div class="personal-page" routerLink="/orders">Ваши заказы</div>
    </div>
    <div class="data-form" [formGroup]="formUserInfo">
      <div class="data-form-block">
        <div class="data-form-label">Личные данные</div>
        <div class="data-form-label-additional">Введённые данные автоматически подставятся при оформлении заказа.</div>
        <div class="data-form-inputs personal-data-inputs">
          <input formControlName="lastName"
                 [ngStyle]="{'border-color': formUserInfo.get('lastName')?.invalid && (formUserInfo.get('lastName')?.touched ||
                   formUserInfo.get('lastName')?.dirty) ? 'red' : ''}"
                 type="text" class="input" placeholder="Фамилия">
          <input formControlName="firstName"
                 [ngStyle]="{'border-color': formUserInfo.get('firstName')?.invalid && (formUserInfo.get('firstName')?.touched ||
                   formUserInfo.get('firstName')?.dirty) ? 'red' : ''}"
                 type="text" class="input" placeholder="Имя">
          <input formControlName="fatherName"
                 [ngStyle]="{'border-color': formUserInfo.get('fatherName')?.invalid && (formUserInfo.get('fatherName')?.touched ||
                   formUserInfo.get('fatherName')?.dirty) ? 'red' : ''}"
                 type="text" class="input" placeholder="Отчество">
          <input formControlName="phone"
                 [ngStyle]="{'border-color': formUserInfo.get('phone')?.invalid && (formUserInfo.get('phone')?.touched ||
                   formUserInfo.get('phone')?.dirty) ? 'red' : ''}"
                 type="text" class="input" placeholder="Телефон">
          <input formControlName="email"
                 [ngStyle]="{'border-color': formUserInfo.get('email')?.invalid && (formUserInfo.get('email')?.touched ||
                   formUserInfo.get('email')?.dirty) ? 'red' : ''}"
                 type="text" class="input" placeholder="Е-mail">
        </div>
      </div>
      <div class="data-form-block">
        <div class="data-form-label">Адрес доставки</div>
        <div class="data-form-inputs address-inputs">
          <input formControlName="street"
                 [ngStyle]="{'border-color': formUserInfo.get('street')?.invalid && (formUserInfo.get('street')?.touched ||
                   formUserInfo.get('street')?.dirty) ? 'red' : ''}"
                 type="text" class="input street" placeholder="Улица">
          <input formControlName="house"
                 [ngStyle]="{'border-color': formUserInfo.get('house')?.invalid && (formUserInfo.get('house')?.touched ||
                   formUserInfo.get('house')?.dirty) ? 'red' : ''}"
                 type="text" class="input house" placeholder="№ дома">
          <input formControlName="entrance"
                 [ngStyle]="{'border-color': formUserInfo.get('entrance')?.invalid && (formUserInfo.get('entrance')?.touched ||
                   formUserInfo.get('entrance')?.dirty) ? 'red' : ''}"
                 type="text" class="input entrance" placeholder="Подъезд">
          <input formControlName="apartment"
                 [ngStyle]="{'border-color': formUserInfo.get('apartment')?.invalid && (formUserInfo.get('apartment')?.touched ||
                   formUserInfo.get('apartment')?.dirty) ? 'red' : ''}"
                 type="text" class="input apartment" placeholder="№ квартиры">
        </div>
      </div>
      <div class="data-form-block">
        <div class="data-form-label">Предпочитаемый способ доставки</div>
        <div class="data-form-types">
          <div class="data-form-type" [class.active]="deliveryType === deliveryTypes.delivery"
               (click)="changeDeliveryType(deliveryTypes.delivery)">Курьером
          </div>
          <div class="data-form-type" [class.active]="deliveryType === deliveryTypes.self"
               (click)="changeDeliveryType(deliveryTypes.self)">Самовывоз
          </div>
        </div>
      </div>
      <div class="data-form-block">
        <div class="data-form-label">Предпочитаемый способ оплаты</div>
        <div class="data-form-radio">
          <div class="data-form-radio-block">
            <input formControlName="paymentType" type="radio" id="cart" value="{{PaymentType.cardOnline}}">
            <label for="cart">Оплата банковской картой в интернет-магазине</label>
          </div>
          <div class="data-form-radio-block">
            <input formControlName="paymentType" type="radio" id="cashless" value="{{PaymentType.cardToCourier}}">
            <label for="cashless">Безналичный расчет при получении</label>
          </div>
          <div class="data-form-radio-block">
            <input formControlName="paymentType" type="radio" id="cash" value="{{PaymentType.cashToCourier}}">
            <label for="cash">Наличный расчет при получении</label>
          </div>
        </div>
      </div>
      <button class="button" [disabled]="!(formUserInfo.dirty && formUserInfo.valid)" (click)="updateUserInfo()">Сохранить</button>
    </div>
  </div>
  <div class="page-image">
    <img src="../public/images/pages/main.png" alt="image">
  </div>
</div>
